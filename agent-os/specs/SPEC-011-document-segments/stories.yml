# Stories for SPEC-011
# Agents may only modify 'status' and 'verified_by' fields

stories:
  STORY-001:
    name: Parent ID Schema and Index
    description: >
      Add parent_id INTEGER REFERENCES documents(id) column to the documents
      table. Add idx_documents_parent_id index. Handle migration for existing
      databases (add nullable column). parent_id defaults to NULL (standalone
      document — backward compatible with all existing data).
    status: pending
    verified_by: []

  STORY-002:
    name: Save Parent Storage Method
    description: >
      Implement save_parent() on StorageAdapter. Creates a document row with
      the provided URI, plugin, record_type, metadata, and other fields.
      No tenant_id parameter — StorageAdapter operates on a single per-tenant
      database (per ADR-010). Does NOT insert into vec_documents (no vector).
      Does NOT insert into doc_weights (no weight — score is derived from
      children). Returns the document ID for child segments to reference.
    status: pending
    verified_by: []

  STORY-003:
    name: Parent ID on Save Payload
    description: >
      Add optional parent_id parameter (int | None, default None) to
      save_payload(). When provided, validate that the referenced parent
      document exists (raise ValueError if not). Store parent_id on the
      inserted document row. When None, behavior is identical to today.
    status: pending
    verified_by: []

  STORY-004:
    name: Parent ID in Search Results
    description: >
      Append d.parent_id to the END of the SELECT clause in BOTH retrieval
      methods: retrieve_by_vector_similarity (KNN path) AND
      retrieve_by_weight (weight-ranked path — separate method, not a
      branch within retrieve_by_vector_similarity). Do not insert
      mid-SELECT — hardcoded row indices will shift. Include parent_id
      in result dicts (None for standalone/parent documents, int for
      segments). Parent documents with no vector or weight will never
      appear in results from either method.
    status: pending
    verified_by: []

  STORY-005:
    name: Get Document with Segments
    description: >
      Implement get_document_with_segments(doc_id) on StorageAdapter. If doc_id
      is a parent, return parent metadata + all non-tombstoned child segments
      with scores. If doc_id is a segment, look up its parent_id and return
      parent metadata + all sibling segments. If doc_id is standalone (no parent,
      no children), return just the document with empty segments list. Include
      aggregate_score (AVG of children) and segment_count on the parent.
    status: pending
    verified_by: []

  STORY-006:
    name: Aggregate Parent Scoring
    description: >
      Implement get_parent_aggregate_score(parent_id) on StorageAdapter.
      Compute AVG(usage_score) across non-tombstoned children joined with
      doc_weights. Return aggregate_score, segment_count, min_score, max_score.
      Return aggregate_score=None and segment_count=0 if parent has no
      non-tombstoned children.
    status: pending
    verified_by: []

  STORY-007:
    name: Delete Operations (Cascade + delete_by_id)
    description: >
      Update delete_by_uri to cascade delete children when a parent document
      is deleted. For each matching document, check for children via parent_id.
      Collect all child IDs and delete their weights, vectors, and document
      rows alongside the parent. Return total count of all deleted documents
      (parent + children). Implement delete_by_id(doc_id) for surgical
      single-document deletion: if the document is a parent, cascade deletes
      all children; if a segment, deletes only that segment (parent and
      siblings unaffected); if standalone, deletes just that document.
      No cascade flag — parents always cascade, segments are always surgical.
    status: pending
    verified_by: []

  STORY-008:
    name: MarkdownPlugin Segment Migration
    description: >
      Update MarkdownPlugin to use parent-child segments. Add markdown_source
      RecordTypeSpec for parent documents. Update process_bundle to create a
      parent document per source file (via save_parent), then create paragraph
      chunks as segments (via save_payload with parent_id). Update
      wipe-and-replace call from delete_by_uri(uri, record_type="markdown_chunk")
      to delete_by_uri(uri, record_type="markdown_source") — cascade delete
      handles children. Emit separate IngestionEvent per record type (one for
      parent with record_type="markdown_source", one for segments with
      record_type="markdown_chunk"). Update all existing MarkdownPlugin tests
      to account for parent documents.
    status: pending
    verified_by: []

  STORY-009:
    name: Update Documentation, Diagrams, and Fix Stale References
    description: >
      Update plugin developer guide: add "Working with Segments" section with
      examples, update "Chunks are a plugin concept" section, fix stale
      doctype/DoctypeSpec references to record_type/RecordTypeSpec throughout
      code examples, add ADR-008/009 and SPEC-010/011 to reference table.
      Add mermaid diagrams to system overview and/or design docs: parent-child
      document hierarchy, ingestion flow with segments (save_parent then
      save_payload with parent_id), segment navigation flow
      (get_document_with_segments). Update system overview: add segment model
      to architecture description, update development status for SPEC-006
      through SPEC-011. Update README.md: update development status
      (SPEC-006/007/008/009 complete, add SPEC-010/011). Update ADR-002:
      add cross-reference to ADR-009, note segments formalize chunking. Update
      ADR-003: add cross-reference to ADR-009, note segments formalize
      "unit of weighting is the row" with explicit hierarchy.
    status: pending
    verified_by: []

  STORY-010:
    name: Segment Ordering Test Coverage
    description: >
      Add test that explicitly verifies get_document_with_segments returns
      segments in insertion order. Create a parent with N segments inserted
      sequentially, then assert result["segments"][i] corresponds to the
      i-th inserted segment (by id and URI). Existing tests use sets for
      segment verification — this test must use ordered list comparison.
      Verify that the ORDER BY d.id clause in the SQL query is the
      mechanism guaranteeing order.
    status: pending
    verified_by: []

  STORY-011:
    name: Document Segment Ordering Contract
    description: >
      Update plugin developer guide "Working with Segments" section to
      document the ordering contract: the order plugins call save_payload
      is the order segments are retrievable in via get_document_with_segments.
      Explain that this is guaranteed by ORDER BY id on autoincrement IDs
      and synchronous save_payload. Note that retrieve_by_vector_similarity
      and retrieve_by_weight return relevance-ranked results, not positional
      order. Update ADR-009 section 6 (Discoverability) to note that
      get_document_with_segments returns segments in insertion order.
    status: pending
    verified_by: []

verification:
  criteria:
    - All pytest tests pass for every story (no regressions).
    - parent_id column exists on documents table, nullable, defaults to NULL.
    - save_parent creates a document row with no vector and no weight.
    - save_payload accepts optional parent_id and validates parent exists.
    - retrieve_by_vector_similarity returns parent_id in result dicts.
    - retrieve_by_weight returns parent_id in result dicts.
    - parent_id appended to end of SELECT clauses in both methods (no mid-list insertion).
    - get_document_with_segments navigates parent/segment/standalone cases correctly.
    - get_parent_aggregate_score returns AVG of non-tombstoned children's scores.
    - delete_by_uri cascades to children when deleting a parent.
    - delete_by_id cascades for parents, is surgical for segments.
    - MarkdownPlugin creates parent per source file and segments per paragraph.
    - MarkdownPlugin wipe-and-replace targets record_type="markdown_source" (not "markdown_chunk").
    - MarkdownPlugin emits separate IngestionEvent per record type.
    - Existing standalone documents (parent_id=NULL) continue to work identically.
    - Documentation is updated with segment patterns and stale references fixed.
    - get_document_with_segments returns segments in insertion order (ORDER BY id).
    - Test explicitly asserts segment ordering (ordered list, not set comparison).
    - Plugin developer guide documents the ordering contract.
    - ADR-009 documents ordering guarantee on get_document_with_segments.
  completed: false
