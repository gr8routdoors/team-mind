# Stories for SPEC-010
# Agents may only modify 'status' and 'verified_by' fields

stories:
  STORY-001:
    name: system.sqlite and TenantStorageManager
    description: >
      Create TenantStorageManager class. Initialize system.sqlite with
      registered_plugins and tenants tables. Implement create_tenant,
      list_tenants, get_adapter (lazy connection management with LRU eviction).
      Auto-create default tenant on initialization. Migrate plugin registry
      methods (save_plugin_record, get_enabled_plugin_records,
      disable_plugin_record, delete_plugin_record) from StorageAdapter to
      TenantStorageManager operating on system.sqlite.
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review

  STORY-002:
    name: Per-Tenant Database Lifecycle
    description: >
      get_adapter creates tenant directory and data.sqlite on first access
      (lazy initialization). StorageAdapter.initialize() no longer creates
      registered_plugins table. Per-tenant schema: documents, vec_documents,
      doc_weights tables — identical to current minus registered_plugins,
      no tenant_id column. Verify get_adapter raises ValueError for
      unregistered tenants.
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review

  STORY-003:
    name: Ingestion Pipeline Routing
    description: >
      Add tenant_id and storage fields to IngestionBundle (tenant_id
      defaults to "default", storage is injected by pipeline). Add
      tenant_id field to IngestionEvent (default "default").
      IngestionPipeline.ingest() gains tenant_id parameter (default "default").
      Pipeline auto-creates unregistered tenants on ingestion (try/create/retry).
      Pipeline injects tenant-specific StorageAdapter into bundle.storage.
      Processors use bundle.storage instead of self.storage — no constructor
      changes. MarkdownPlugin migration is a one-line change (self.storage →
      bundle.storage). EventFilter unchanged — tenant filtering on observers
      is future work.
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review

  STORY-004:
    name: Metadata Search Filters
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review
    description: >
      Add metadata_filters parameter (dict[str, str] | None) to
      retrieve_by_vector_similarity. Each entry becomes a WHERE clause
      using json_extract(d.metadata, '$.key') = ?. Filters compose with
      existing plugin/record_type filters. KNN over-fetch multiplier
      unchanged — 4x constant is adequate at per-tenant shard scale.

  STORY-005:
    name: Optional Vector Query (Weight-Ranked Retrieval)
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review
    description: >
      Make target_vector optional (None allowed) in
      retrieve_by_vector_similarity. When None, query documents table
      directly without vec_documents join. Rank results by composite
      weight score (usage_score * decay) descending. All other filters
      (metadata, plugin, record_type) still apply. Tombstoned documents
      still excluded.

  STORY-006:
    name: Cross-Tenant Scatter-Gather
    status: passing
    verified_by:
      - spec-compliance-review
      - code-quality-review
    description: >
      Implement TenantStorageManager.query_across_tenants. Sequential
      shard queries (MVP). Run query_fn on each tenant's StorageAdapter,
      collect results, inject tenant_id into each result dict, merge,
      re-sort by sort_key with caller-specified direction (sort_descending
      flag — False for distance-based final_rank, True for weight-based
      weight_rank), trim to limit. When tenant_ids is None, query all
      registered tenants.

  STORY-007:
    name: MCP Tools and CLI
    description: >
      Update semantic_search tool: add tenant_ids (list[str], optional)
      and metadata_filters (dict, optional) parameters. Make query
      parameter optional. ALWAYS route through query_across_tenants (even
      for single tenant) for consistent result format — every result dict
      includes tenant_id. Set sort_descending based on whether vector
      query was used (False for vector, True for non-vector).
      Update ingest_documents tool: add tenant_id parameter (default
      "default"). Update provide_feedback tool: add required tenant_id
      parameter (doc_id is only unique within a shard). FeedbackPlugin
      constructor changes from StorageAdapter to TenantStorageManager;
      call_tool resolves adapter via
      self.tenant_manager.get_adapter(arguments["tenant_id"]). Update
      cli.py where FeedbackPlugin is initialized. Update CLI ingest
      subcommand: add --tenant-id flag (default "default").
    status: pending
    verified_by: []

  STORY-008:
    name: Update Existing Tests
    description: >
      Update all existing tests to use TenantStorageManager where needed.
      Update test helpers and fixtures. Add tests for tenant isolation:
      same URI in different tenant shards creates separate documents,
      search within a shard is isolated, cross-tenant scatter-gather
      merges correctly. Add tests for metadata filters and optional
      vector query. Add tests for system.sqlite plugin registry.
    status: pending
    verified_by: []

  STORY-009:
    name: Update Documentation and Diagrams
    description: >
      Update system overview with sharding model, metadata search, and
      TenantStorageManager. Add mermaid diagrams: tenant sharding file
      layout, scatter-gather query flow, TenantStorageManager component
      relationships. Update plugin developer guide: plugins don't know
      about tenants, tenant routing is pipeline/manager concern. Update
      repo README: development status for SPEC-010, update architecture
      diagram to show multi-tenancy layer. Update ADR-002 with
      cross-references to ADR-008 and ADR-010. Update roadmap with
      SPEC-010 status. Ensure structural-vs-metadata field guidance
      is documented.
    status: pending
    verified_by: []

verification:
  criteria:
    - All pytest tests pass for every story (no regressions).
    - TenantStorageManager initializes system.sqlite with registered_plugins and tenants tables.
    - Default tenant auto-created on initialization.
    - get_adapter returns a StorageAdapter for a registered tenant.
    - get_adapter lazily creates tenant directory and data.sqlite on first access.
    - get_adapter raises ValueError for unregistered tenants (when called directly).
    - IngestionPipeline.ingest() auto-creates unregistered tenants transparently.
    - Plugin registry methods operate on system.sqlite (not per-tenant databases).
    - Same URI in different tenant shards creates separate documents.
    - IngestionPipeline.ingest() routes to correct shard via tenant_id.
    - IngestionBundle carries tenant_id and storage (tenant-specific adapter).
    - Processors use bundle.storage, not self.storage.
    - IngestionEvent carries tenant_id.
    - retrieve_by_vector_similarity filters by metadata_filters when provided.
    - retrieve_by_vector_similarity works without target_vector (weight-ranked).
    - query_across_tenants merges results from multiple shards correctly.
    - query_across_tenants injects tenant_id into every result dict.
    - semantic_search always routes through query_across_tenants (consistent result format).
    - semantic_search sets sort_descending correctly (False for vector, True for non-vector).
    - semantic_search MCP tool accepts tenant_ids, metadata_filters, optional query.
    - ingest_documents MCP tool accepts tenant_id (defaults to "default").
    - provide_feedback MCP tool requires tenant_id.
    - Tombstoned documents excluded in all query paths.
  completed: false
