# Stories for SPEC-007
# Agents may only modify 'status' and 'verified_by' fields

stories:
  STORY-001:
    name: Reliability Hint on IngestionBundle
    description: >
      Add optional reliability_hint (float, 0.0-1.0) to IngestionBundle.
      The hint travels with the bundle from the ingestion caller to all
      processors. None means no hint provided.
    status: pending
    verified_by: null

  STORY-002:
    name: Default Reliability on DoctypeSpec
    description: >
      Add optional default_reliability (float, 0.0-1.0) to DoctypeSpec.
      Plugins declare a baseline reliability for their doctypes.
      None means no default (equivalent to 0.0).
    status: pending
    verified_by: null

  STORY-003:
    name: Initial Score on save_payload
    description: >
      Add optional initial_score parameter to save_payload. When provided,
      seeds usage_score in doc_weights to this value instead of 0.0.
      The signal_count remains 0 so future feedback averages correctly.
    status: pending
    verified_by: null

  STORY-004:
    name: Pipeline and MCP Tool Propagation
    description: >
      Update IngestionPipeline.ingest() to accept reliability_hint and
      attach it to the bundle. Update ingest_documents MCP tool to accept
      reliability_hint parameter. Update CLI ingest to accept --reliability flag.
    status: pending
    verified_by: null

  STORY-005:
    name: MarkdownPlugin Reliability Integration
    description: >
      Update MarkdownPlugin to read bundle.reliability_hint and its own
      default_reliability, then pass the resolved value as initial_score
      to save_payload. Plugin uses hint if provided, falls back to default.
    status: pending
    verified_by: null

  STORY-006:
    name: Update Documentation
    description: >
      Update plugin developer guide with reliability seeding (three layers,
      examples). Update roadmap to replace Librarian with reliability seeding
      and background conflict detection. Update system overview.
    status: pending
    verified_by: null

verification:
  criteria:
    - All pytest BDD tests pass for every story.
    - Existing tests pass (no regressions).
    - Documents seeded with higher reliability rank higher in search results.
    - Ingest hint propagates from caller through pipeline to plugin to storage.
    - Plugin can override hint with its own reliability decision.
    - Default reliability works when no hint is provided.
  completed: false
  completed_date: null
